<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Portal da Universidade</title>
</head>

<body style="font-family: sans-serif; text-align: center;">

  <h1>Portal da Universidade</h1>

  <p>
    Status do Sistema:
    <span id="status">Online</span>
  </p>

  <div
    id="nova-funcao"
    style="
      display: none;
      background: #e0f7fa;
      padding: 20px;
      border: 2px solid #00bcd4;
      margin: 20px;
    "
  >
    <h3>Nova Função: Chat Acadêmico com IA 🚀</h3>

    <input
      type="text"
      id="pergunta"
      placeholder="Pergunte algo..."
    >

    <button id="btn-enviar">
      Enviar
    </button>

    <p id="resposta"></p>
  </div>

  <script src="app.js"></script>

</body>
</html>
